</head>
<body>

   <header>

           <div class="intro-box">
               <p>Hi, I'm <strong>Riddhi Vikamshi</strong>, and this is a database that I created for my Programming class at Berklee. I do not own all of this information, it is all sourced from the web. I have coded this website with the help of Gemini. This is still a work in progress, so it doesn't have a lot of raagas. Please feel free to use it for personal and/or educational purposes.</p>
